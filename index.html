<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>

    <!-- Tailwind CSS Link-->
     <link rel="stylesheet" href="./src/output.css">

     <!-- Font Awesome CDN link-->
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="bg-[#f8fafc]">
    <!-- Header-->
    <header class="py-10 px-6 text-center shadow-lg bg-gradient-to-r from-sky-200 via-white to-sky-200 rounded-b-3xl">
        <i class="fa-solid fa-sack-dollar text-4xl text-blue-950"></i>
        <h1 class="text-3xl text-blue-950 font-bold">Expense Tracker</h1>
        <p class="text-slate-500 mt-2">Manage income and expenses with ease</p>
    </header>
    
    <!-- Balance Section -->
    <section class="flex flex-col justify-between items-center w-[50%]text-center mt-6 shadow rounded-lg p-6 bg-[#e8f0fe] mx-4">
        <h2 class="text-slate-500 text-sm uppercase tracking-[5px]">
            Current Balance
        </h2>

        <p 
        class="text-4xl font-bold mt-2"
        id="balance">
            ₦0.00
        </p>
    </section>
    
     <!-- Income and Expenses Sections -->
    <section class="grid grid-cols-2 gap-4 mt-8 px-4">
        <!-- Income Card -->
        <div class="bg-[#e8f0fe] rounded-lg shadow p-4 text-center">
            <h3 class="text-slate-500 text-sm">Income</h3>
            <p class="text-green-600 text-2xl font-bold mt-2" id="income">
                #0.00
            </p>
        </div>

        <!-- Expenses Card -->
        <div class="bg-[#e8f0fe] rounded-lg shadow p-4 text-center">
            <h3 class="text-slate-500 text-sm">Expenses</h3>
            <p class="text-red-600 text-2xl font-bold mt-2" id="expenses">
                #0.00
            </p>
        </div>
    </section>

    <!-- Transaction Form -->
     <section class="mt-8 rounded-lg shadow p-6">
        <h2 class="text-xl font-semibold mb-4">Add Transaction</h2>

        <form id="transaction-form" class="bg-gray space-y-4">
            <!-- Description Input -->
            <div>
                <label
                for="description-input"
                class="block text-sm font-semibold text-slate-600 mb-1"
                >
                Description
                </label>

                <input 
                id="description-input"
                type="text"
                placeholder="Description"
                class="w-full h-12 px-3 border rounded-lg">

                <p
                  id="description-error"
                  class="hidden text-red-600 text-sm mt-1">
                </p>
            </div>
            
            <!-- Amount Input -->
            <div>
                <label
                for="amount-input"
                class="block text-sm font-medium text-slate-600 mb-1"
                >
                Amount
                </label>

                <input 
                id="amount-input"
                type="number"
                placeholder="Amount"
                class="w-full h-12 px-3 border rounded-lg">

                <p
                  id="amount-error"
                  class="hidden text-red-600 text-sm mt-1">
                </p>
            </div>

            <!-- Type Select -->
            <div>
                <label
                for="type-select"
                class="block text-sm font-medium text-slate-600 mb-1"
                >
                Type
                </label>

                <select
                id="type-select"
                class="w-full h-12 px-3 border rounded-lg">
                    <option value="">Select Type</option>
                    <option value="income">Income</option>
                    <option value="expense">Expense</option>
                </select>

                <p
                  id="type-error"
                  class="hidden text-red-600 text-sm mt-1">
                </p>
            </div>

            <!-- Date Input -->
            <div>
                <label
                for="date"
                class="block text-sm font-medium text-slate-600 mb-1"
                >
                Date
                </label>

                <input 
                type="date"
                id="date"
                class="w-full h-12 px-3 border rounded-lg">

                <p
                  id="date-error"
                  class="hidden text-red-600 text-sm mt-1">
                </p>
            </div>

            <button 
            type="submit"
            class="w-full bg-indigo-600 hover:bg-indigo-700 transition text-white font-bold p-3 rounded-lg"
            id="submit-button"
            >
                Add Transaction
            </button>

            <button
              id="cancel-button"
              type="button"
              class="hidden w-full bg-slate-500 hover:bg-gray-600 text-white font-bold p-3 rounded-lg">
              Cancel
            </button>

        </form>

        <!-- Recent Transactions -->
        <section class="mt-8 bg-[#e8f0fe] rounded-lg shadow p-6">
            <h2 class="text-xl text-center font-semibold mb-4">Recent Transactions</h2>
            <div id="transactions-list">
                <p class="text-slate-500 text-center">No transactions yet</p>
            </div>
        </section>
     </section>

     <script src="./js/app.js"></script>

     <footer>
         <p class="text-center text-slate-500 text-xs mt-2">(programmed by <a class="font-medium text-indigo-600 hover:text-indigo-800 tracking-widest" href="https://ckelechieze.github.io/cornelius-portfolio-aiassignment/" target="_blank">Kelechi Eze</a>)</p>
     </footer>
</body>
</html>
