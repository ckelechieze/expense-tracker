<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>

    <!-- Tailwind CSS Link-->
     <link rel="stylesheet" href="./src/output.css">
</head>
<body>
    <!-- Header-->
    <header class="py-8 text-center">
        <h1 class="text-3xl font-bold">Expense Tracker</h1>
        <p class="text-slate-500 mt-2">Manage income and expenses with ease</p>
    </header>
    
    <!-- Balance Section -->
    <section class="text-center mt-8">
        <h2 class="text-slate-500 text-sm uppercase tracking-wide">
            Current Balance
        </h2>

        <p 
        class="text-4xl font-bold mt-2"
        id="balance">
            #0.00
        </p>
    </section>
    
     <!-- Income and Expenses Sections -->
    <section class="grid grid-cols-2 gap-4 mt-8">
        <!-- Income Card -->
        <div class="bg-gray-100 rounded-lg shadow p-4 text-center">
            <h3 class="text-slate-500 text-sm">Income</h3>
            <p class="text-green-600 text-2xl font-bold mt-2" id="income">
                #0.00
            </p>
        </div>

        <!-- Expenses Card -->
        <div class="bg-gray-100 rounded-lg shadow p-4 text-center">
            <h3 class="text-slate-500 text-sm">Expenses</h3>
            <p class="text-red-600 text-2xl font-bold mt-2" id="expenses">
                #0.00
            </p>
        </div>
    </section>

    <!-- Transaction Form -->
     <section class="mt-8 rounded-lg shadow p-6">
        <h2 class="text-xl font-semibold mb-4">Add Transaction</h2>

        <form id="transaction-form" class="bg-gray space-y-4">
            <!-- Description Input -->
            <input 
            id="description-input"
            type="text"
            placeholder="Description"
            class="w-full border rounded-lg p-3">
            
            <!-- Amount Input -->
            <input 
            id="amount-input"
            type="number"
            placeholder="Amount"
            class="w-full border rounded-lg p-3">

            <!-- Type Select -->
            <select
            id="type-select"
            class="w-full border rounded-lg p-3">
                <option value="">Select Type</option>
                <option value="income">Income</option>
                <option value="expense">Expense</option>
            </select>
            
            <!-- Date Input -->
            <input 
            type="date"
            id="date"
            class="w-full border rounded-lg p-3">

            <button 
            type="submit"
            class="w-full bg-indigo-600 hover:bg-indigo-700 transition text-white font-bold p-3 rounded-lg">
                Add Transaction
            </button>

        </form>

        <!-- Recent Transactions -->
        <section class="mt-8 bg-gray-100 rounded-lg shadow p-6">
            <h2 class="text-xl font-semibold mb-4">Recent Transactions</h2>
            <div id="transactions-list">
                <p class="text-slate-500 text-center">No transactions yet.</p>
            </div>
        </section>
     </section>

     <script src="./js/app.js"></script>
</body>
</html>
